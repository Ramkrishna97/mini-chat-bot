spring.application.name=CHAT-BOT
server.port=8008

# Optional: Increase timeout for LLM responses
spring.mvc.async.request-timeout=120000
# system.properties (for Render's native build)
java.runtime.version=17

# Use the internal service name and port once the Ollama service is live
# For example: http://ollama-service:11434
spring.ai.ollama.base-url=${OLLAMA_BASE_URL:http://localhost:11434}
spring.ai.ollama.chat.model=${OLLAMA_MODEL:gemma3:4b}

# Development mode
spring.devtools.restart.enabled=true

# Thymeleaf Configuration
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# Logging
logging.level.com.example.llmapp=DEBUG
logging.level.org.springframework.web=INFO

# Swagger Configuration
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.try-it-out-enabled=true

# Server configuration
spring.web.error.include-message=always
spring.web.error.include-binding-errors=always