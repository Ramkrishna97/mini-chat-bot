<!DOCTYPE html>
<html>
<head>
    <title>Local Chatbot</title>
    <style>
        body { font-family: Arial; max-width: 800px; margin: 50px auto; }
        #chat-box { height: 400px; border: 1px solid #ccc; padding: 10px; overflow-y: scroll; }
        .user-message { background: #e3f2fd; padding: 10px; margin: 5px; border-radius: 5px; }
        .bot-message { background: #f5f5f5; padding: 10px; margin: 5px; border-radius: 5px; }
        input[type=text] { width: 70%; padding: 10px; }
        button { padding: 10px 20px; }
    </style>
</head>
<body>
<h2>Local Chatbot</h2>
<div id="chat-box"></div>
<input type="text" id="question" placeholder="Ask something...">
<button onclick="sendQuestion()">Send</button>

<script>
    function sendQuestion() {
        let question = document.getElementById('question').value;
        if (!question) return;

        // Display user question
        let chatBox = document.getElementById('chat-box');
        chatBox.innerHTML += `<div class="user-message">You: ${question}</div>`;

        // Send to API
        fetch('/api/chat/ask?question=' + encodeURIComponent(question))
            .then(response => response.text())
            .then(data => {
                chatBox.innerHTML += `<div class="bot-message">Bot: ${data}</div>`;
                chatBox.scrollTop = chatBox.scrollHeight;
            });

        document.getElementById('question').value = '';
    }
</script>
</body>
</html>
